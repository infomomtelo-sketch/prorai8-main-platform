<!DOCTYPE html>
<html lang="en">

<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Available Rentals | Prorai8</title>

<style>

body{
font-family:Arial, sans-serif;
background:#f4f6fb;
margin:0;
}

.container{
max-width:1200px;
margin:auto;
padding:40px 20px;
}

h1{
text-align:center;
margin-bottom:40px;
}

.grid{
display:grid;
grid-template-columns:repeat(auto-fit,minmax(260px,1fr));
gap:25px;
}

.card{
background:white;
border-radius:12px;
overflow:hidden;
box-shadow:0 8px 20px rgba(0,0,0,0.08);
transition:0.2s;
}

.card:hover{
transform:translateY(-5px);
}

.card img{
width:100%;
height:180px;
object-fit:cover;
}

.card-body{
padding:18px;
}

.title{
font-size:18px;
font-weight:bold;
margin-bottom:5px;
}

.location{
color:#666;
font-size:14px;
margin-bottom:10px;
}

.price{
font-weight:bold;
color:#2563eb;
margin-bottom:12px;
}

.btn{
display:inline-block;
padding:10px 14px;
background:#2563eb;
color:white;
text-decoration:none;
border-radius:8px;
font-size:14px;
}

.btn:hover{
background:#1d4ed8;
}

</style>

</head>

<body>

<div class="container">

<h1>Available Rentals</h1>

<div class="grid">

<!-- Property 1 -->

<div class="card">
<img src="https://images.unsplash.com/photo-1505691723518-36a5ac3b2d3c">
<div class="card-body">

<div class="title">Private Room</div>

<div class="location">Fresno, CA</div>

<div class="price">$55 / night</div>

<a href="/listing/sample-listing.html" class="btn">View Details</a>

</div>
</div>

<!-- Property 2 -->

<div class="card">
<img src="https://images.unsplash.com/photo-1560448075-bb485b067938">
<div class="card-body">

<div class="title">Studio ADU</div>

<div class="location">Clovis, CA</div>

<div class="price">$85 / night</div>

<a href="/listing/sample-listing.html" class="btn">View Details</a>

</div>
</div>

<!-- Property 3 -->

<div class="card">
<img src="https://images.unsplash.com/photo-1560185127-6ed189bf02f4">
<div class="card-body">

<div class="title">Private Room + Bath</div>

<div class="location">Hanford, CA</div>

<div class="price">$75 / night</div>

<a href="/listing/sample-listing.html" class="btn">View Details</a>

</div>
</div>

<!-- Property 4 -->

<div class="title">Guest Studio</div>

<div class="location">Visalia, CA</div>

<div class="price">$95 / night</div>

<a href="/listing/sample-listing.html" class="btn">View Details</a>

</div>
</div>

</div>

</div>

</body>

</html>
